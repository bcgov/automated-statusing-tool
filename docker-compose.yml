x-shared-env: &shared-env
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_ACCESS_ID: ${S3_ACCESS_ID}
  S3_KEY: ${S3_KEY}
  S3_BUCKET: ${S3_BUCKET}
  NO_PROXY: ${NO_PROXY}
  AWS_REQUEST_CHECKSUM_CALCULATION: "when_required"
  AWS_RESPONSE_CHECKSUM_VALIDATION: "when_required"
  APP_VERSION: 'dev-local'

services:
  # Object Storage infrastructure
  minio:
    image: quay.io/minio/minio:latest
    container_name: local-s3
    ports:
      - "9000:9000" # S3 API Port
      - "9001:9001" # Web Console Port
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_ID:-local-access-key}
      - MINIO_ROOT_PASSWORD=${S3_KEY:-local-secret-key}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - s3-network

  minio-setup:
    image: quay.io/minio/mc:latest
    container_name: local-s3_setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set localS3 http://local-s3:9000 ${S3_ACCESS_ID:-local-access-key} ${S3_KEY:-local-secret-key}) do echo '...waiting...' && sleep 1; done;

      echo 'Creating bucket....';
      /usr/bin/mc mb localS3/${S3_BUCKET:-burn-severity-local};
      /usr/bin/mc policy set download localS3/${S3_BUCKET:-burn-severity-local};

      echo 'Setup complete';
      exit 0;
      "
    networks:
      - s3-network

volumes:
  minio-data:

networks:
  s3-network:
    driver: bridge